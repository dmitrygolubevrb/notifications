services:
    redis:
        image: redis:7-alpine
        container_name: redis_container
        environment:
            REDIS_PASSWORD: ${REDIS_USER_PASSWORD}
        ports:
            - "6380:6379"
        volumes:
            - ./redisdata:/data
        command: [ "redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_USER_PASSWORD}" ]
        healthcheck:
            test: [ "CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG" ]
            interval: 30s
            timeout: 10s
            retries: 5
        restart: unless-stopped
        networks:
            - app

    rabbitmq:
        image: rabbitmq:3-management
        container_name: rabbitmq_container
        environment:
            RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
            RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
        ports:
            - "5673:5672"
            - "15673:15672"
        volumes:
            - rabbitmq-data:/var/lib/rabbitmq
        healthcheck:
            test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
            interval: 30s
            timeout: 10s
            retries: 5
        restart: unless-stopped
        deploy:
            resources:
                limits:
                    cpus: '0.50'
                    memory: 512M
                reservations:
                    cpus: '0.25'
                    memory: 256M
        networks:
            - app

    postgres:
        container_name: postgres_container
        image: postgres:latest
        command:
            - "postgres"
            - "-c"
            - "max_connections=50"
            - "-c"
            - "shared_buffers=1GB"
            - "-c"
            - "effective_cache_size=4GB"
            - "-c"
            - "work_mem=16MB"
            - "-c"
            - "maintenance_work_mem=512MB"
            - "-c"
            - "random_page_cost=1.1"
            - "-c"
            - "temp_file_limit=10GB"
            - "-c"
            - "log_min_duration_statement=200ms"
            - "-c"
            - "idle_in_transaction_session_timeout=10s"
            - "-c"
            - "lock_timeout=1s"
            - "-c"
            - "statement_timeout=60s"
            - "-c"
            - "shared_preload_libraries=pg_stat_statements"
            - "-c"
            - "pg_stat_statements.max=10000"
            - "-c"
            - "pg_stat_statements.track=all"
        environment:
            POSTGRES_DB: ${DB_DATABASE}
            POSTGRES_USER: ${DB_USERNAME}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
            PGDATA: "/home/postgresql/data/pgdata"
        volumes:
            - ../2. Init Database:/docker-entrypoint-initdb.d
            - db-data:/home/postgresql/data
        ports:
            - "5433:5432"
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U $DB_USERNAME -d $DB_DATABASE" ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s
        restart: unless-stopped
        deploy:
            resources:
                limits:
                    cpus: '1'
                    memory: 4G
        networks:
            - app

    pgadmin:
        container_name: pgadmin_container
        image: dpage/pgadmin4:latest
        environment:
            PGADMIN_DEFAULT_EMAIL: "postgres@mail.com"
            PGADMIN_DEFAULT_PASSWORD: "root"
            PGADMIN_CONFIG_SERVER_MODE: "False"
        volumes:
            - pgadmin-data:/var/lib/pgadmin
        ports:
            - "8081:80"
        restart: unless-stopped
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 1G
        networks:
            - app

    app:
        build:
            context: ./docker/setup
        container_name: app_container
        working_dir: /app
        volumes:
            - .:/app
        env_file:
            - .env
        environment:
            DB_HOST: postgres
            DB_PORT: 5432
            REDIS_HOST: redis
            REDIS_PORT: 6379
            REDIS_USERNAME: ""
            REDIS_PASSWORD: ${REDIS_USER_PASSWORD}
            RABBITMQ_HOST: rabbitmq
            RABBITMQ_PORT: 5672
            QUEUE_CONNECTION: rabbitmq
            CACHE_STORE: redis
        ports:
            - "8000:8000"
            - "5173:5173"
        depends_on:
            postgres:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy
        networks:
            - app
        restart: unless-stopped
        tty: true
        stdin_open: true
        healthcheck:
            test: [ "CMD-SHELL", "php -r \"exit(@file_get_contents('http://127.0.0.1:8000')?0:1);\"" ]
            interval: 10s
            timeout: 5s
            retries: 12
            start_period: 120s

    worker:
        build:
            context: ./docker/setup
        container_name: worker_container
        working_dir: /app
        entrypoint: [ "/usr/local/bin/worker-entrypoint.sh" ]
        volumes:
            - .:/app
        env_file:
            - .env
        environment:
            DB_HOST: postgres
            DB_PORT: 5432
            REDIS_HOST: redis
            REDIS_PORT: 6379
            REDIS_USERNAME: ""
            REDIS_PASSWORD: ${REDIS_USER_PASSWORD}
            RABBITMQ_HOST: rabbitmq
            RABBITMQ_PORT: 5672
            QUEUE_CONNECTION: rabbitmq
            CACHE_STORE: redis
        depends_on:
            app:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        networks:
            - app
        restart: unless-stopped

volumes:
    db-data:
    pgadmin-data:
    rabbitmq-data:

networks:
    app:
        driver: bridge

